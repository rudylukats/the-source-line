name: Generate puzzles

on:
  schedule:
    # Once a day, shortly after midnight UTC so the new theme is ready
    # before most visitors' morning.
    - cron: "7 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate puzzles
        run: python scripts/generate_puzzles.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add puzzles.json
          git diff --staged --quiet || git commit -m "Update puzzles $(date -u +'%Y-%m-%d')"
          git push
